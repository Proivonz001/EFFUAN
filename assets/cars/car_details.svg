<svg xmlns="http://www.w3.org/2000/svg" width="64" height="30" viewBox="0 0 64 30">
  <!-- Neutral layer drawn over the tinted livery: tyres, cockpit, halo. -->
  <!-- rear tyres -->
  <rect x="5" y="0" width="12.5" height="8" rx="3" fill="#17171a"/>
  <rect x="5" y="22" width="12.5" height="8" rx="3" fill="#17171a"/>
  <!-- front tyres -->
  <rect x="42" y="1" width="10.5" height="7.4" rx="3" fill="#17171a"/>
  <rect x="42" y="21.6" width="10.5" height="7.4" rx="3" fill="#17171a"/>
  <!-- axles -->
  <rect x="9" y="7.5" width="4" height="15" fill="#00000038"/>
  <rect x="45" y="8" width="3" height="14" fill="#00000038"/>
  <!-- center darkening stripe -->
  <rect x="10" y="13.4" width="34" height="3.2" rx="1.6" fill="#00000026"/>
  <!-- cockpit -->
  <ellipse cx="30.5" cy="15" rx="5.6" ry="4.2" fill="#0e0e11"/>
  <!-- halo -->
  <ellipse cx="31.5" cy="15" rx="6.8" ry="5.2" fill="none" stroke="#2c2c31" stroke-width="1.5"/>
  <ellipse cx="36.8" cy="15" rx="1.5" ry="1.5" fill="#2c2c31"/>
</svg>
